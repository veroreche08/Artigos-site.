<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Artigos Científicos</title>

<style>
body {font-family: Arial; background:#f4f6f8; margin:0;}
header {background:#2c7be5; color:white; padding:20px; text-align:center;}
.container {padding:20px;}
.artigo {background:white; padding:20px; margin-bottom:20px; border-radius:10px;}
textarea {width:100%; min-height:150px; font-size:16px;}
</style>

</head>
<body>

<header><h1>Artigos Científicos</h1></header>

<div class="container">

<div class="artigo"><h2>Artigo 7</h2><textarea id="a7"></textarea></div>
<div class="artigo"><h2>Artigo 8</h2><textarea id="a8"></textarea></div>
<div class="artigo"><h2>Artigo 9</h2><textarea id="a9"></textarea></div>
<div class="artigo"><h2>Artigo 10</h2><textarea id="a10"></textarea></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBnEfbLrYhAAR134OUOjUs4s5rh2VBHi1s",
  authDomain: "artigos-site.firebaseapp.com",
  projectId: "artigos-site",
  storageBucket: "artigos-site.firebasestorage.app",
  messagingSenderId: "641284640611",
  appId: "1:641284640611:web:5fae8e7a513d22ea6b8d56"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

["a7","a8","a9","a10"].forEach(id => {

  const el = document.getElementById(id);

  onSnapshot(doc(db, "artigos", id), (docSnap) => {
    if (docSnap.exists()) {

      if (document.activeElement !== el) {
        el.value = docSnap.data().texto || "";
      }

    } else {
      el.value = "";
    }
  });

  el.addEventListener("input", async () => {
    try {
      await setDoc(doc(db, "artigos", id), {
        texto: el.value
      });
    } catch (e) {
      console.error("Erro ao salvar:", e);
    }
  });

});

</script>

</body>
</html>
